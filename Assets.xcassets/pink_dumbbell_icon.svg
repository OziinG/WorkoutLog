<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 투명 배경으로 핑크색 3D 덤벨 아이콘 -->
  
  <!-- 왼쪽 무게판 -->
  <g transform="translate(150, 300)">
    <!-- 무게판 메인 -->
    <rect x="0" y="0" width="120" height="120" rx="15" fill="#E91E63" stroke="#AD1457" stroke-width="3"/>
    <!-- 3D 효과 상단면 -->
    <polygon points="15,0 105,0 120,15 15,15" fill="#F8BBD9"/>
    <!-- 3D 효과 우측면 -->
    <polygon points="120,15 120,105 105,120 105,0" fill="#C2185B"/>
    <!-- 하이라이트 -->
    <rect x="10" y="10" width="100" height="20" rx="5" fill="#F8BBD9" opacity="0.7"/>
    <!-- 중앙 홀 -->
    <ellipse cx="60" cy="60" rx="15" ry="15" fill="#AD1457"/>
    <ellipse cx="60" cy="60" rx="10" ry="10" fill="#880E4F"/>
  </g>
  
  <!-- 왼쪽 연결부 -->
  <g transform="translate(270, 350)">
    <rect x="0" y="0" width="80" height="20" fill="#E91E63"/>
    <rect x="0" y="0" width="80" height="5" fill="#F8BBD9"/>
    <rect x="75" y="0" width="5" height="20" fill="#C2185B"/>
  </g>
  
  <!-- 중앙 핸들 -->
  <g transform="translate(350, 320)">
    <!-- 핸들 메인 -->
    <rect x="0" y="0" width="324" height="84" rx="42" fill="#E91E63" stroke="#AD1457" stroke-width="2"/>
    <!-- 상단 하이라이트 -->
    <rect x="5" y="5" width="314" height="20" rx="10" fill="#F8BBD9" opacity="0.8"/>
    <!-- 그립 텍스처 -->
    <g opacity="0.6">
      <line x1="80" y1="20" x2="80" y2="64" stroke="#AD1457" stroke-width="2"/>
      <line x1="100" y1="20" x2="100" y2="64" stroke="#AD1457" stroke-width="2"/>
      <line x1="120" y1="20" x2="120" y2="64" stroke="#AD1457" stroke-width="2"/>
      <line x1="140" y1="20" x2="140" y2="64" stroke="#AD1457" stroke-width="2"/>
      <line x1="160" y1="20" x2="160" y2="64" stroke="#AD1457" stroke-width="2"/>
      <line x1="180" y1="20" x2="180" y2="64" stroke="#AD1457" stroke-width="2"/>
      <line x1="200" y1="20" x2="200" y2="64" stroke="#AD1457" stroke-width="2"/>
      <line x1="220" y1="20" x2="220" y2="64" stroke="#AD1457" stroke-width="2"/>
      <line x1="240" y1="20" x2="240" y2="64" stroke="#AD1457" stroke-width="2"/>
    </g>
    <!-- 하단 그림자 -->
    <rect x="5" y="70" width="314" height="10" rx="5" fill="#AD1457" opacity="0.5"/>
  </g>
  
  <!-- 오른쪽 연결부 -->
  <g transform="translate(674, 350)">
    <rect x="0" y="0" width="80" height="20" fill="#E91E63"/>
    <rect x="0" y="0" width="80" height="5" fill="#F8BBD9"/>
    <rect x="75" y="0" width="5" height="20" fill="#C2185B"/>
  </g>
  
  <!-- 오른쪽 무게판 -->
  <g transform="translate(754, 300)">
    <!-- 무게판 메인 -->
    <rect x="0" y="0" width="120" height="120" rx="15" fill="#E91E63" stroke="#AD1457" stroke-width="3"/>
    <!-- 3D 효과 상단면 -->
    <polygon points="15,0 105,0 120,15 15,15" fill="#F8BBD9"/>
    <!-- 3D 효과 우측면 -->
    <polygon points="120,15 120,105 105,120 105,0" fill="#C2185B"/>
    <!-- 하이라이트 -->
    <rect x="10" y="10" width="100" height="20" rx="5" fill="#F8BBD9" opacity="0.7"/>
    <!-- 중앙 홀 -->
    <ellipse cx="60" cy="60" rx="15" ry="15" fill="#AD1457"/>
    <ellipse cx="60" cy="60" rx="10" ry="10" fill="#880E4F"/>
  </g>
</svg>